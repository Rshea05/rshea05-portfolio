<style>
  .portfolio,
  .portfolio * {
    box-sizing: border-box;
  }

  .portfolio {
    --ink: #151515;
    --muted: #5f646c;
    --line: #d9dde2;
    --panel: #ffffff;
    --accent: #1f6f68;
    --accent-dark: #164c48;
    --warm: #c66a3b;
    --soft: #eef3f2;
    --shadow: 0 18px 45px rgba(19, 29, 33, 0.08);
    width: 100%;
    padding: clamp(44px, 7vw, 88px) clamp(20px, 5vw, 64px);
    color: var(--ink);
    font-family: "Source Sans Pro", Arial, sans-serif;
    line-height: 1.55;
  }

  .portfolio-inner {
    max-width: 1120px;
    margin: 0 auto;
  }

  .case-list {
    display: grid;
    gap: 28px;
  }

  .case-card {
    display: grid !important;
    grid-template-columns: minmax(280px, 0.78fr) minmax(0, 1fr);
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: var(--shadow);
    color: var(--ink);
    text-decoration: none;
  }

  .case-link {
    transition: transform 180ms ease, box-shadow 180ms ease;
  }

  .case-link:hover,
  .case-link:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 22px 52px rgba(19, 29, 33, 0.12);
  }

  .case-media {
    position: relative;
    min-height: 340px;
    border-right: 1px solid var(--line);
    background:
      linear-gradient(135deg, rgba(31, 111, 104, 0.2), rgba(198, 106, 59, 0.12)),
      var(--soft);
  }

  .case-media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .case-media.has-image::before,
  .case-media.has-image::after,
  .case-media.has-image .screen-lines {
    display: none;
  }

  .case-media::before,
  .case-media::after {
    position: absolute;
    content: "";
    border: 1px solid rgba(21, 21, 21, 0.12);
    background: rgba(255, 255, 255, 0.74);
    box-shadow: 0 16px 35px rgba(22, 76, 72, 0.12);
  }

  .case-media::before {
    inset: 56px 38px auto;
    height: 156px;
    border-radius: 8px;
  }

  .case-media::after {
    right: 48px;
    bottom: 46px;
    width: 46%;
    height: 118px;
    border-radius: 8px;
  }

  .screen-lines {
    position: absolute;
    left: 58px;
    right: 58px;
    top: 86px;
    z-index: 1;
    display: grid;
    gap: 12px;
  }

  .screen-lines span {
    display: block;
    height: 10px;
    border-radius: 999px;
    background: rgba(31, 111, 104, 0.2);
  }

  .screen-lines span:nth-child(2) {
    width: 68%;
  }

  .screen-lines span:nth-child(3) {
    width: 42%;
    background: rgba(198, 106, 59, 0.28);
  }

  .case-content {
    padding: clamp(24px, 4vw, 44px);
  }

  .case-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 4px 10px;
    border: 1px solid rgba(31, 111, 104, 0.22);
    border-radius: 999px;
    color: var(--accent-dark);
    background: rgba(31, 111, 104, 0.08);
    font-size: 0.8rem;
    font-weight: 700;
  }

  .case-content h3 {
    margin: 0 0 12px;
    color: var(--ink);
    font-family: Montserrat, Arial, sans-serif;
    font-size: clamp(1.55rem, 3vw, 2.3rem);
    line-height: 1.12;
  }

  .case-summary {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 1.05rem;
  }

  .case-details {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin: 0 0 28px;
  }

  .case-details dt {
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
  }

  .case-details dd {
    margin: 0;
    color: var(--ink);
    font-weight: 700;
  }

  .case-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 10px 16px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--accent);
    color: #ffffff;
    font-weight: 800;
    text-decoration: none;
  }

  @media (max-width: 860px) {
    .case-card {
      display: block !important;
    }

    .case-media {
      min-height: 250px;
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }
  }

  @media (max-width: 560px) {
    .portfolio {
      padding-inline: 16px;
    }

    .case-details {
      grid-template-columns: 1fr;
      gap: 12px;
    }
  }
</style>
